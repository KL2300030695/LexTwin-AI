[pytest]
pythonpath = .
testpaths = tests
addopts = -m "not slow and not llm"
markers =
    slow: real-dataset tests that are CPU-heavy (e.g. table extraction on 70+ page PDFs); run explicitly with `pytest -m slow`
    llm: tests that call a real AI provider API (cost + requires ANTHROPIC_API_KEY or GEMINI_API_KEY); run explicitly with `pytest -m llm`
