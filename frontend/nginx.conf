server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the backend container, matching vite.config.ts's
    # dev-server proxy so the app talks to the same /api path in both dev
    # and this Docker setup -- the browser never needs to know the backend
    # is a separate service, and the backend's CORS allowlist (locked to
    # http://localhost:5173 for local dev) is irrelevant here since this is
    # a server-to-server proxy, not a cross-origin browser request.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Contradiction/redline/chat calls can take 1-2+ minutes on CPU-only
        # local inference (see README Performance section) -- default nginx
        # timeouts would cut those off mid-request.
        proxy_read_timeout 300s;
    }

    # react-router-dom client-side routing: any path not matching a real
    # static file falls back to index.html so the SPA's own router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
