services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - USE_FIREBASE=false
    volumes:
      # Uploaded documents + local-disk fallback store survive a container
      # restart instead of vanishing every time.
      - backend_local_data:/app/local_data
      # The local LLM's GGUF file (~3.8GB) and the Chat with Contract
      # embedding model (~1.3GB) are downloaded once from Hugging Face Hub
      # on first use -- this volume caches them so a container restart
      # doesn't redownload multiple GB.
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # Firebase Web config is baked into the static build at image-build
      # time (see frontend/Dockerfile) -- docker compose substitutes these
      # from a .env file at the REPO ROOT (not frontend/.env, which is a
      # separate file used by the plain `npm run dev` path) or from your
      # shell's exported environment. Without these set, the built frontend
      # can't sign anyone in -- see the README's Docker mode section.
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_local_data:
  hf_cache:
